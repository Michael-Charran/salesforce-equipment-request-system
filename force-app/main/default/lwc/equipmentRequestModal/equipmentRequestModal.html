<template>
    <template if:true={isOpen}>
        <section role="dialog"
                 tabindex="-1"
                 aria-modal="true"
                 class="slds-modal slds-fade-in-open">

            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">
                        Edit Equipment Request
                    </h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-record-edit-form
                        object-api-name="Equipment_Request__c"
                        record-id={recordId}
                        onsuccess={handleSuccess}>

                        <lightning-messages></lightning-messages>

                        <lightning-input-field field-name="Equipment_Type__c">
                        </lightning-input-field>

                        <lightning-input-field field-name="Estimated_Cost__c">
                        </lightning-input-field>

                        <lightning-input-field field-name="Justification__c">
                        </lightning-input-field>

                        <lightning-input-field field-name="Status__c">
                        </lightning-input-field>

                        <div class="slds-m-top_medium">
                            <lightning-button
                                label="Cancel"
                                onclick={close}>
                            </lightning-button>

                            <lightning-button
                                variant="brand"
                                type="submit"
                                label="Save"
                                class="slds-m-left_small">
                            </lightning-button>
                        </div>

                    </lightning-record-edit-form>

                </div>

            </div>

        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>

    </template>
</template>
